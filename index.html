<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Utah Legislature Bill Subjects</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            background: white;
            border-radius: 12px;
            padding: 32px;
            margin-bottom: 24px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .header h1 {
            font-size: 36px;
            font-weight: 700;
            color: #1a202c;
            margin-bottom: 12px;
        }

        .header p {
            font-size: 16px;
            color: #718096;
        }

        .controls {
            background: white;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 24px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
        }

        .controls label {
            font-size: 18px;
            font-weight: 600;
            color: #1a202c;
        }

        .controls input {
            padding: 10px 16px;
            font-size: 16px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            width: 120px;
            transition: border-color 0.2s;
        }

        .controls input:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn {
            padding: 10px 24px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5568d3;
            transform: translateY(-1px);
            box-shadow: 0 4px 8px rgba(102, 126, 234, 0.3);
        }

        .btn-success {
            background: #48bb78;
            color: white;
            display: none;
        }

        .btn-success:hover {
            background: #38a169;
            transform: translateY(-1px);
            box-shadow: 0 4px 8px rgba(72, 187, 120, 0.3);
        }

        #loading {
            background: white;
            border-radius: 12px;
            padding: 40px;
            text-align: center;
            font-size: 18px;
            font-weight: 600;
            color: #4a5568;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        #resultsContainer {
            background: white;
            border-radius: 12px;
            padding: 32px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .results-header h2 {
            font-size: 28px;
            font-weight: 700;
            color: #1a202c;
            margin-bottom: 8px;
        }

        .results-header p {
            font-size: 16px;
            color: #718096;
            margin-bottom: 24px;
        }

        .subject-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .subject-item {
            background: #f7fafc;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .subject-item:hover {
            background: #edf2f7;
            border-color: #cbd5e0;
            transform: translateX(4px);
        }

        .subject-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .subject-name {
            font-size: 18px;
            font-weight: 600;
            color: #2d3748;
        }

        .bill-count {
            background: #667eea;
            color: white;
            border-radius: 20px;
            padding: 6px 16px;
            font-size: 14px;
            font-weight: 600;
        }

        .bills-list {
            display: none;
            margin-top: 16px;
            padding-top: 16px;
            border-top: 2px solid #e2e8f0;
        }

        .bills-list.expanded {
            display: block;
        }

        .bill-item {
            padding: 8px 0;
            font-size: 14px;
            color: #4a5568;
            line-height: 1.6;
        }

        .bill-item strong {
            color: #2d3748;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏛️ Utah Legislature Bill Subjects</h1>
            <p>Explore and export bill subjects from Utah's General Sessions</p>
        </div>

        <div class="controls">
            <label for="yearInput">Select Year:</label>
            <input type="number" id="yearInput" min="2000">
            <button class="btn btn-primary" id="loadButton">Load Bills</button>
            <button class="btn btn-success" id="exportButton">Export to CSV</button>
        </div>
    </div>

    <script>
        // Replace 'myKey' with your actual API key
        const myKey = 'C14C3E7FB1C7E71C7F6C357C02D6D09C';

        
        let currentDate = new Date();
        let currentYear = currentDate.getFullYear();
        const subjectMap = new Map();

        // Set up year input
        const yearInput = document.getElementById('yearInput');
        yearInput.value = currentYear;
        yearInput.max = currentYear;

        // Load button event
        document.getElementById('loadButton').addEventListener('click', () => {
            const selectedYear = parseInt(yearInput.value);
            if (selectedYear >= 2000 && selectedYear <= currentYear) {
                subjectMap.clear();
                const existingResults = document.querySelector('#resultsContainer');
                if (existingResults) existingResults.remove();
                const existingLoading = document.querySelector('#loading');
                if (existingLoading) existingLoading.remove();
                
                document.getElementById('exportButton').style.display = 'none';
                loadBillsForYear(selectedYear);
            } else {
                alert(`Please enter a year between 2000 and ${currentYear}`);
            }
        });

        // Export button event
        document.getElementById('exportButton').addEventListener('click', exportToCSV);

        // Load bills for a specific year
        function loadBillsForYear(year) {
            const billListPath = `https://glen.le.utah.gov/bills/${year}GS/billlist/${myKey}`;
            
            fetch(billListPath)
                .then((response) => response.json())
                .then((allData) => {
                    billList(allData, year);
                })
                .catch((error) => {
                    console.error('Error fetching bill list:', error);
                    alert('Error loading bills. Please check your API key and try again.');
                });
        }

        // Process the list of bills
        function billList(billListResults, year) {
            const bills = billListResults.slice(1, 500);
            let fetchedCount = 0;

            
            const loadingDiv = document.createElement('div');
            loadingDiv.id = 'loading';
            loadingDiv.textContent = `Loading bills... 0/${bills.length}`;
            document.querySelector('.container').appendChild(loadingDiv);
            
            bills.forEach(bill => {
                const billNumber = bill.number;
                const billDetailsPath = `https://glen.le.utah.gov/bills/${year}GS/${billNumber}/${myKey}`;
                
                fetch(billDetailsPath)
                    .then((response) => response.json())
                    .then((billData) => {
                        processSubjects(billData);
                        fetchedCount++;
                        loadingDiv.textContent = `Loading bills... ${fetchedCount}/${bills.length}`;
                        
                        if (fetchedCount === bills.length) {
                            loadingDiv.remove();
                            displaySubjectsList(year);
                            document.getElementById('exportButton').style.display = 'inline-block';
                        }
                    })
                    .catch((error) => {
                        console.error(`Error fetching details for ${billNumber}:`, error);
                        fetchedCount++;
                        loadingDiv.textContent = `Loading bills... ${fetchedCount}/${bills.length}`;
                        
                        if (fetchedCount === bills.length) {
                            loadingDiv.remove();
                            displaySubjectsList(year);
                            document.getElementById('exportButton').style.display = 'inline-block';
                        }
                    });
            });
        }

        // Process subjects from each bill
        function processSubjects(billData) {
            const billVersionList = billData.billVersionList || [];
            
            let activeVersion = billVersionList.find(version => version.activeVersion === true);
            if (!activeVersion && billVersionList.length > 0) {
                activeVersion = billVersionList[billVersionList.length - 1];
            }
            
            const subjects = activeVersion?.subjectList || [];
            
            subjects.forEach(subject => {
                const subjectName = subject.description || 'Unknown Subject';
                
                if (!subjectMap.has(subjectName)) {
                    subjectMap.set(subjectName, []);
                }
                
                subjectMap.get(subjectName).push({
                    billNumber: billData.billNumberShort,
                    shortTitle: billData.shortTitle
                });
            });
        }

        // Display all subjects in a list
        function displaySubjectsList(year) {
            const container = document.createElement('div');
            container.id = 'resultsContainer';
            
            const header = document.createElement('div');
            header.className = 'results-header';
            header.innerHTML = `
                <h2>All Bill Subjects (${year} General Session)</h2>
                <p>${subjectMap.size} unique subjects found</p>
            `;
            
            const sortedSubjects = Array.from(subjectMap.entries()).sort((a, b) => 
                a[0].localeCompare(b[0])
            );
            
            const list = document.createElement('div');
            list.className = 'subject-list';
            
            sortedSubjects.forEach(([subject, bills]) => {
                const item = document.createElement('div');
                item.className = 'subject-item';
                
                const subjectHeader = document.createElement('div');
                subjectHeader.className = 'subject-header';
                subjectHeader.innerHTML = `
                    <div class="subject-name">${subject}</div>
                    <div class="bill-count">${bills.length} bill${bills.length !== 1 ? 's' : ''}</div>
                `;
                
                const billsList = document.createElement('div');
                billsList.className = 'bills-list';
                
                bills.forEach(bill => {
                    const billItem = document.createElement('div');
                    billItem.className = 'bill-item';
                    billItem.innerHTML = `<strong>${bill.billNumber}</strong> - ${bill.shortTitle}`;
                    billsList.appendChild(billItem);
                });
                
                item.appendChild(subjectHeader);
                item.appendChild(billsList);
                
                item.addEventListener('click', () => {
                    billsList.classList.toggle('expanded');
                });
                
                list.appendChild(item);
            });
            
            container.appendChild(header);
            container.appendChild(list);
            document.querySelector('.container').appendChild(container);
        }

        // Export to CSV
        function exportToCSV() {
            if (subjectMap.size === 0) {
                alert('No data to export. Please load bills first.');
                return;
            }
            
            let csv = 'Subject,Number of Bills,Bills List\n';
            
            const sortedSubjects = Array.from(subjectMap.entries()).sort((a, b) => 
                a[0].localeCompare(b[0])
            );
            
            sortedSubjects.forEach(([subject, bills]) => {
                const escapedSubject = `"${subject.replace(/"/g, '""')}"`;
                const billsList = bills.map(bill => 
                    `${bill.billNumber}: ${bill.shortTitle}`
                ).join('; ');
                const escapedBillsList = `"${billsList.replace(/"/g, '""')}"`;
                
                csv += `${escapedSubject},${bills.length},${escapedBillsList}\n`;
            });
            
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            const url = URL.createObjectURL(blob);
            
            const year = yearInput.value;
            
            link.setAttribute('href', url);
            link.setAttribute('download', `bill_subjects_${year}.csv`);
            link.style.visibility = 'hidden';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        // Auto-load current year on page load
        loadBillsForYear(currentYear);
    </script>
</body>
</html>
